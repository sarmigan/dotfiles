allow_remote_control yes

include ./theme.conf

window_padding_width 4

# BEGIN_KITTY_FONTS
font_family      family="JetBrains Mono NL"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS

hide_window_decorations yes

shell_integration no-rc

confirm_os_window_close 0
