format = """
$username\
$hostname\
$directory\
$git_branch\
\n$character"""

[username]
show_always = true
style_root = "bold #7DF9FF"
style_user = "bold #7DF9FF"
format = "[$user]($style)"

[hostname]
ssh_only = false
format = ' | [$hostname]($style)'
style = "bold #7DF9FF"

[directory]
style = 'bold #FF5F00'
truncation_symbol = '... /' 
format = ' | [$path]($style)'

[git_branch]
style = 'bold #BF00FF'
format = ' | \[[$branch(:$remote_branch)]($style)\]'

[character]
success_symbol = '[>](bold #00FF41)'
error_symbol = '[>](bold #FF1E00)'
