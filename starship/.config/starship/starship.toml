format = """
$username\
:\
$hostname\
$directory\
$git_branch\
\n$character"""

[username]
show_always = true
style_root = "bold #00CFFF"
style_user = "bold #00CFFF"
format = "[$user]($style)"

[hostname]
ssh_only = false
format = '[$hostname]($style)'
style = "bold #00CFFF"

[directory]
style = 'bold #FF6B00'
truncation_symbol = '... /' 
format = ' | [$path]($style)'

[git_branch]
style = 'bold #BF00FF'
format = ' | \[[$branch(:$remote_branch)]($style)\]'

[character]
success_symbol = '[->](bold #00FF41)'
error_symbol = '[->](bold #FF1E00)'
