format = """
$python\
$username\
$hostname\
$directory\
$git_branch\
\n$character"""

[python]
format = '[(\($virtualenv\) )]($style)'
style = 'bold yellow'

[username]
show_always = true
style_root = "#7DF9FF"
style_user = "#7DF9FF"
format = "[$user]($style)"

[hostname]
ssh_only = false
format = '.[$hostname]($style)'
style = "#7DF9FF"

[directory]
style = '#FF5F00'
truncation_symbol = '... /' 
format = ' | [$path]($style)'

[git_branch]
style = 'bold #BF00FF'
format = ' \[[$branch(:$remote_branch)]($style)\]'

[character]
success_symbol = '[>](#00FF41)'
error_symbol = '[>](#FF1E00)'
